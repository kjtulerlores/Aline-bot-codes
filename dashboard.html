<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Aline Dashboard - Rosa</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #fff1f2; color: #831843; }
        input, textarea, select { background-color: white !important; border: 2px solid #fbcfe8 !important; color: #db2777 !important; outline: none !important; }
        .embed-card { background-color: white; border-left: 6px solid #f472b6; border-radius: 12px; padding: 16px; box-shadow: 0 10px 20px rgba(0,0,0,0.05); }
    </style>
</head>
<body class="h-screen flex overflow-hidden">

    <aside class="w-20 bg-pink-500 flex flex-col items-center py-6 gap-6 shadow-inner flex-none">
        <div class="w-12 h-12 bg-pink-300 rounded-2xl flex items-center justify-center text-2xl shadow-lg border-2 border-white">🎀</div>
    </aside>

    <div class="w-[450px] bg-pink-50/50 p-6 border-r border-pink-100 overflow-y-auto">
        <h2 class="text-pink-600 font-black text-2xl mb-6 italic italic uppercase">Editor Aline</h2>
        
        <div class="space-y-4">
            <div class="bg-white p-4 rounded-3xl border-2 border-pink-100 shadow-sm">
                <label class="text-[10px] font-black text-pink-300 uppercase">Selecione o Canal</label>
                <select class="w-full mt-1 p-2 rounded-xl text-sm font-bold">
                    <option># chat-geral-rosa 🌸</option>
                </select>
            </div>

            <input type="text" id="in-name" placeholder="Nome do Bot" oninput="update()" class="w-full p-4 rounded-3xl text-sm font-bold shadow-sm">
            <textarea id="in-desc" placeholder="Mensagem do seu embed..." oninput="update()" class="w-full p-4 rounded-3xl text-sm h-40 resize-none font-bold shadow-sm"></textarea>
            
            <div class="flex gap-4">
                <input type="color" id="in-color" value="#f472b6" oninput="update()" class="w-24 h-14 rounded-2xl cursor-pointer">
                <input type="text" id="in-thumb" placeholder="Thumbnail URL" oninput="update()" class="flex-1 p-4 rounded-3xl text-sm font-bold shadow-sm">
            </div>

            <button class="w-full bg-pink-600 py-5 rounded-3xl font-black text-white shadow-xl hover:brightness-110 active:scale-95 transition-all text-xl">ENVIAR AGORA 🌸</button>
        </div>
    </div>

    <main class="flex-1 p-10 flex justify-center items-start bg-white/50">
        <div class="w-full max-w-lg flex gap-4">
            <div class="w-12 h-12 bg-pink-200 rounded-full flex-none shadow-md border-2 border-white"></div>
            <div class="flex-1">
                <span id="p-name" class="font-black text-pink-600 italic text-lg">Aline</span>
                <div id="p-embed" class="embed-card mt-2 hidden">
                    <div id="p-desc" class="text-pink-800 text-sm font-bold italic leading-relaxed"></div>
                </div>
            </div>
        </div>
    </main>

    <script>
        function update() {
            const desc = document.getElementById('in-desc').value;
            const embed = document.getElementById('p-embed');
            document.getElementById('p-name').innerText = document.getElementById('in-name').value || "Aline";
            
            if (desc) {
                embed.classList.remove('hidden');
                embed.style.borderLeftColor = document.getElementById('in-color').value;
                document.getElementById('p-desc').innerText = desc;
            } else { embed.classList.add('hidden'); }
        }
    </script>
</body>
</html>
